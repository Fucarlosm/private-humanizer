[plugin]
config_version = "1.0.0"
enabled = true
private_only = true
target_platforms = ["qq"]
target_user_ids = []
target_session_ids = []

[time_awareness]
enabled = true
timezone = "Asia/Shanghai"
holiday_region = "CN"
custom_dates_enabled = true

[schedule]
enabled = true
generation_mode = "daily"
refresh_hours = [
    7,
    12,
    18,
    22,
]
inject_into_planner = false
inject_into_replyer = true
allow_manual_override = true
manual_status = ""
reference_only = true
allow_user_interrupt = true
manual_schedule = ""

[life_environment]
enabled = true
environment = ""
auto_generate_when_empty = true
use_as_reference_only = true

[profile]
enabled = true
inject_into_private_prompt = true
require_evidence_for_preferences = true

[[target_profiles]]
profile_id = "target"
platform = "qq"
user_id = ""
session_id = ""
display_name = ""
basic_info = ""
preferences = ""
important_dates = ""
relationship_notes = ""

[guard]
fact_guard_enabled = true
anniversary_guard_enabled = true
style_guard_enabled = true
memory_guard_enabled = true
max_reply_chars_soft = 80
max_reply_chars_hard = 160

[proactive_followup]
enabled = true
delay_seconds = 35
cooldown_seconds = 180
max_per_hour = 6
min_reply_chars = 2
intent = "这是私聊增强插件发起的主动续话检查。请回看刚才这一轮用户发言和你已经发出的回复，像真人私聊一样判断是否还需要自然补一句。只有在话题仍有余温、对方可能期待承接、或你刚才的回复留下了可继续的情绪/信息时才主动发一条很短的后续；如果要发，1-2句即可，先回应用户刚说的话再自然延伸，不要开启全新话题；如果刚才已经完整收束、对方明显不需要继续、或继续会显得打扰，就选择不发。不要编造未确认事实，不要解释插件，不要重复刚才的话，不要预设未来安排。"

[logging]
enabled = true
log_level = "info"
save_rewrite_pairs = false
